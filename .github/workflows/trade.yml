name: Trading Bot

on:
  schedule:
    - cron: '*/20 * * * *'   # every 20 minutes, 24/7
  workflow_dispatch:           # manual trigger from GitHub UI

# Only ever run ONE trading cycle at a time. If a manual run and a scheduled
# run (or two scheduled runs) overlap, the second waits instead of executing
# concurrently — this prevents two cycles racing on the shared trade DB cache,
# double-trading, or overcommitting the wallet. We never cancel a run mid-cycle
# (cancel-in-progress: false) so an in-flight trade/settlement always finishes.
concurrency:
  group: trading-bot
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Restore trade database + trained model
        uses: actions/cache/restore@v4   # restore-only: no auto-save
        with:
          path: |
            tradetestagent.db
            ml/xgb_calibrator.joblib
          key: trade-db-${{ github.run_number }}
          restore-keys: |
            trade-db-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Init database
        run: python -c "from core.database import init_db; init_db()"

      - name: Run one trading cycle
        env:
          POLYMARKET_KEY_ID: ${{ secrets.POLYMARKET_KEY_ID }}
          POLYMARKET_SECRET_KEY: ${{ secrets.POLYMARKET_SECRET_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          NOTIFY_FROM_EMAIL: ${{ secrets.NOTIFY_FROM_EMAIL }}
          NOTIFY_SMTP_PASSWORD: ${{ secrets.NOTIFY_SMTP_PASSWORD }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          LIVE_EXCHANGE: polymarket_us
          BANKROLL_USDC: "98.0"          # fallback only — real wallet balance is fetched live each cycle
          AB_TESTING_ENABLED: "true"
          MIN_CONFIDENCE: "0.40"         # FAVORITES MODE: loose so favorites actually place
          MIN_EDGE: "0.0"                # FAVORITES MODE: back favorites even near fair value (win-rate priority)
          FEE_BUFFER: "0.0"
          MIN_ENTRY_PRICE: "0.68"        # FAVORITES MODE: only bet sides priced >= 68% → targets ~70% win rate
          KELLY_FRACTION: "0.45"         # bigger bets that scale with edge/bankroll
          MAX_BET_FRACTION: "0.25"       # per-bet cap raised to 25% (conviction scaling keeps weak bets small)
          MAX_OPEN_POSITIONS: "14"       # headroom for ~5 more positions (9 open now)
          PAUSE_NEW_TRADES: "false"      # flip to "true" to hold positions and open nothing new
          NOTIFY_SMTP_HOST: smtp.gmail.com
          NOTIFY_SMTP_PORT: "587"
        run: python main.py --live --run-once --max-trades 5 --top-n 25

      - name: Retrain model on settled trades (continuous learning)
        run: python main.py --retrain || echo "Not enough settled trades to retrain yet"

      - name: Persist updated database + trained model
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            tradetestagent.db
            ml/xgb_calibrator.joblib
          key: trade-db-${{ github.run_number }}
